<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Ankieta</title>
<script src="script.js" defer></script>
</head>
<body>
<div id="content">
    <h2>Dane demograficzne</h2>
    <label>Płeć:</label><br>
    <select id="gender">
        <option value="kobieta">Kobieta</option>
        <option value="mężczyzna">Mężczyzna</option>
        <option value="inne">Inne</option>
    </select><br><br>
    <label>Wiek (w latach):</label><br>
    <input type="number" id="age"><br><br>
    <label>Poziom wykształcenia:</label><br>
    <select id="education">
        <option value="podstawowe">Podstawowe</option>
        <option value="średnie">Średnie</option>
        <option value="zawodowe">Zawodowe</option>
        <option value="techniczne">Techniczne</option>
        <option value="wyższe">Wyższe</option>
    </select><br><br>
    <button onclick="goToLoading()">Przejdź dalej</button>
</div>
</body>
</html>
